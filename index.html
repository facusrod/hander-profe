<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hander — Profesores</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  /* ── BASE (copiado de hander-rutinas) ── */
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; background: #162033; background-image: radial-gradient(circle at 20% 0%, #1f2d4740 0%, transparent 50%); color: #fff; font-family: 'Inter', sans-serif; }

  .topbar { background: #0d1422; border-bottom: 2px solid #c8252c; padding: 14px 24px; display: flex; justify-content: space-between; align-items: center; min-height: 68px; }
  .topbar-brand { display: flex; flex-direction: column; align-items: center; }
  .logo-h { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: #fff; letter-spacing: 2px; -webkit-text-stroke: 2px #c8252c; paint-order: stroke fill; text-shadow: 0 3px 0 #9c1a20; line-height: 1; }
  .logo-sub { font-family: 'Oswald', sans-serif; font-size: 9px; color: #fff; letter-spacing: 2px; margin-top: 2px; text-align: center; }

  .progressions { display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #1f2d47; align-items: end; }

  .w-btn:hover { background: #c8252c; border-color: #c8252c; }
  .w-btn:active { transform: scale(.92); }
  .w-val { width: 100%; background: #0d1422; border: 1px solid #1f2d47; color: #c8252c; font-family: 'Bebas Neue', sans-serif; font-size: 20px; text-align: center; padding: 4px 2px; border-radius: 3px; outline: none; -moz-appearance: textfield; }
  .w-val::-webkit-inner-spin-button, .w-val::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .w-val:focus { border-color: #c8252c; }
  .series-row { font-family: 'Oswald', sans-serif; font-size: 11px; color: #c4cad6; margin-top: 4px; display: flex; flex-direction: column; align-items: center; gap: 2px; letter-spacing: 1px; text-transform: uppercase; }

  .stats-bar { display: flex; background: #0d1422; border: 1px solid #1f2d47; border-radius: 4px; margin-bottom: 16px; overflow: hidden; }

  .stat-num.green { color: #16a34a; }
  .stat-num.muted { color: #8a93a6; }
  .stat-lbl { font-family: 'Oswald', sans-serif; font-size: 9px; letter-spacing: 2px; color: #8a93a6; text-transform: uppercase; margin-top: 3px; }

  /* ── FILTER CHIPS ── */
  .filter-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .chip { background: transparent; border: 1px solid #1f2d47; color: #8a93a6; font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 14px; border-radius: 20px; cursor: pointer; transition: all .15s; white-space: nowrap; }
  .chip:hover { border-color: #c8252c; color: #c8252c; }
  .chip.active { background: #c8252c; border-color: #c8252c; color: #fff; }
  .chip.active-green { background: #16a34a22; border-color: #16a34a; color: #16a34a; }
  .chip.active-gray { background: #1f2d47; border-color: #8a93a6; color: #c4cad6; }
  .sort-btn { background: transparent; border: 1px solid #1f2d47; color: #8a93a6; font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; padding: 5px 10px; border-radius: 3px; cursor: pointer; transition: all .15s; margin-left: auto; white-space: nowrap; }
  .sort-btn:hover { border-color: #c8252c; color: #c8252c; }

  /* ── RESULTS INFO ── */
  .results-info { font-family: 'Oswald', sans-serif; font-size: 11px; color: #8a93a6; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }

  /* ── LOAD MORE ── */
  .load-more-btn { width: 100%; background: transparent; border: 1px solid #1f2d47; color: #8a93a6; font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; padding: 14px; border-radius: 3px; cursor: pointer; transition: all .15s; margin-top: 8px; margin-bottom: 40px; }
  .load-more-btn:hover { border-color: #c8252c; color: #c8252c; }
  .load-more-btn span { color: #8a93a650; font-size: 10px; display: block; margin-top: 3px; letter-spacing: 1px; }

  /* ── MEMBER ROW extra ── */
  .member-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
  .member-updated { font-family: 'Inter', sans-serif; font-size: 11px; color: #8a93a650; white-space: nowrap; }

  /* ── EDITOR ── */
  .member-label { font-family: 'Oswald', sans-serif; font-size: 14px; color: #c4cad6; margin-bottom: 12px; }
  .text-input-big { background: transparent; border: none; border-bottom: 2px solid #1f2d47; color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; padding: 4px 0; outline: none; width: 100%; }
  .text-input-big:focus { border-bottom-color: #c8252c; }
  .text-input-big::placeholder { color: #1f2d4780; }
  .text-input-sub { background: transparent; border: none; border-bottom: 1px solid #1f2d47; color: #c4cad6; font-family: 'Inter', sans-serif; font-size: 14px; padding: 4px 0; outline: none; width: 100%; margin-top: 12px; }
  .text-input-sub:focus { border-bottom-color: #c8252c; }
  .text-input-sub::placeholder { color: #1f2d47; }
  .block-card { background: #0d1422; border: 1px solid #1f2d47; border-radius: 4px; padding: 20px; margin-bottom: 20px; }
  .block-card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .block-name-input { background: transparent; border: none; border-bottom: 1px solid #1f2d47; color: #fff; font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; padding: 2px 0; outline: none; flex: 1; min-width: 100px; }
  .block-name-input:focus { border-bottom-color: #c8252c; }
  .block-series-wrap { display: flex; align-items: center; gap: 6px; font-family: 'Oswald', sans-serif; font-size: 11px; color: #8a93a6; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
  .block-series-input { background: #162033; border: 1px solid #1f2d47; color: #c4cad6; font-family: 'Bebas Neue', sans-serif; font-size: 18px; text-align: center; padding: 2px 4px; border-radius: 3px; outline: none; width: 42px; -moz-appearance: textfield; }
  .block-series-input::-webkit-inner-spin-button, .block-series-input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .block-series-input:focus { border-color: #c8252c; }
  .btn-icon { background: transparent; border: 1px solid #1f2d47; color: #8a93a6; font-size: 13px; padding: 4px 7px; border-radius: 3px; cursor: pointer; transition: all .15s; line-height: 1; }
  .btn-icon:hover { border-color: #c8252c; color: #c8252c; }
  .btn-icon:disabled { opacity: .25; cursor: default; pointer-events: none; }
  .ex-card-editor { background: #162033; border: 1px solid #1f2d47; border-left: 4px solid #1f2d47; padding: 14px 16px; border-radius: 3px; margin-bottom: 8px; }
  .ex-card-editor:focus-within { border-left-color: #c8252c; }
  .ex-top { display: flex; align-items: center; gap: 8px; }
  .ex-num-label { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #8a93a6; width: 28px; text-align: center; flex-shrink: 0; }
  .ex-name-input { background: transparent; border: none; border-bottom: 1px solid #1f2d47; color: #fff; font-family: 'Oswald', sans-serif; font-size: 15px; font-weight: 600; padding: 2px 0; outline: none; flex: 1; }
  .ex-name-input:focus { border-bottom-color: #c8252c; }
  .ex-name-input::placeholder { color: #8a93a6; }
  .notes-input { background: transparent; border: none; border-bottom: 1px solid #1f2d4750; color: #8a93a6; font-family: 'Inter', sans-serif; font-size: 12px; padding: 4px 0; outline: none; width: 100%; margin-top: 8px; }
  .notes-input:focus { border-bottom-color: #c8252c; color: #c4cad6; }
  .notes-input::placeholder { color: #8a93a660; font-style: italic; }
  .prog-del-btn { background: transparent; border: none; color: #8a93a640; font-size: 13px; cursor: pointer; padding: 2px; transition: color .15s; display: block; margin: 4px auto 0; }

<body>

<div class="topbar" id="topbar">
  <div id="topbar-left" style="min-width:80px"></div>
  <div class="topbar-brand">
    <div class="logo-h">HANDER</div>
    <div class="logo-sub">CENTRO DE ENTRENAMIENTO</div>
  </div>
  <div id="topbar-right" style="min-width:80px;display:flex;justify-content:flex-end"></div>
</div>

<div id="save-status" class="save-status"></div>
<div id="root"></div>

<script>
// ── Config ──
const PAGE_SIZE        = 10;
const API_BASE         = 'https://hander.gym-pass.com.ar/api/public';
const API_KEY          = 'hk_1OSGVDJq03IWgiuukDuxTqIhpbx3ueAjMdIbyUDtejg';
const APP_PASSWORD     = 'hander2026'; // cambiar para actualizar la contraseña de acceso
const SAVE_DEBOUNCE_MS = 500;

// ── State ──
let state = {
  view: 'login',
  authenticated: false,
  members: [],           // [{ firstName, lastName, email, routinePlan: { shareToken, updatedAt } | null }]
  editingMember: null,
  currentData: null,     // JSONB mutable
  currentShareToken: null,
  dashFilter: 'all',     // 'all' | 'with' | 'without'
  dashSort: 'az',        // 'az' | 'za'
  dashLimit: PAGE_SIZE,  // cuántos mostrar actualmente
};

// ── Filtered members (para no re-filtrar en openMember) ──
let _filteredMembers = [];

// ── Save ──
let saveTimer = null, saveInFlight = false, savePending = false;
let saveStatusEl = null, saveStatusTimer = null;

function setSaveStatus(s) {
  if (!saveStatusEl) saveStatusEl = document.getElementById('save-status');
  if (!saveStatusEl) return;
  if (saveStatusTimer) { clearTimeout(saveStatusTimer); saveStatusTimer = null; }
  saveStatusEl.className = 'save-status visible save-' + s;
  saveStatusEl.textContent = s === 'saving' ? 'Guardando...' : s === 'saved' ? '✓ Guardado' : '⚠ Error al guardar';
  if (s !== 'saving') {
    saveStatusTimer = setTimeout(() => { saveStatusEl.className = 'save-status'; }, 1800);
  }
}

function triggerSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, SAVE_DEBOUNCE_MS);
}

async function doSave() {
  if (!state.currentData) return;
  if (saveInFlight) { savePending = true; return; }
  saveInFlight = true;
  setSaveStatus('saving');
  try {
    if (state.currentShareToken) {
      const res = await fetch(`${API_BASE}/routines/${encodeURIComponent(state.currentShareToken)}`, {
        method: 'PUT',
        headers: { 'X-Api-Key': API_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({ data: state.currentData }),
      });
      setSaveStatus(res.ok ? 'saved' : 'error');
    } else {
      // Primer guardado del plan: crear via sync (match por email del socio)
      if (!state.editingMember?.email) { setSaveStatus('error'); return; }
      const res = await fetch(`${API_BASE}/routines/sync`, {
        method: 'POST',
        headers: { 'X-Api-Key': API_KEY, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          routines: [{
            match: { email: state.editingMember.email },
            data: state.currentData,
            sourceSheet: 'hander-profe',
          }],
        }),
      });
      if (!res.ok) { setSaveStatus('error'); return; }
      const json = await res.json();
      const matched = json.matched?.[0];
      if (matched?.shareToken) {
        state.currentShareToken = matched.shareToken;
        setSaveStatus('saved');
      } else {
        setSaveStatus('error');
      }
    }
  } catch { setSaveStatus('error'); }
  finally {
    saveInFlight = false;
    if (savePending) { savePending = false; triggerSave(); }
  }
}

// ── Helpers ──
function esc(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function newPlanTemplate() {
  return {
    version: 1, name: '', subtitle: '',
    blocks: [{
      block_number: 1, name: 'Bloque 1', series: 3,
      exercises: [{
        position: 1, name: '', notes: '',
        progressions: [{ week: 1, kg: null, reps: '', series: 3 }],
      }],
    }],
  };
}

// ── Topbar ──
function updateTopbar() {
  const left  = document.getElementById('topbar-left');
  const right = document.getElementById('topbar-right');
  if (!left || !right) return;

  left.innerHTML  = (state.view === 'editor')
    ? `<button class="btn-back" onclick="navigate('dashboard')">← Socios</button>`
    : '';

  right.innerHTML = state.authenticated
    ? `<button class="btn-logout" onclick="logout()">Salir</button>`
    : '';
}

// ── Navigation ──
function navigate(view) {
  state.view = view;
  updateTopbar();
  render();
}

function logout() {
  sessionStorage.removeItem('coach');
  state = { view: 'login', authenticated: false, members: [], editingMember: null, currentData: null, currentShareToken: null, dashFilter: 'all', dashSort: 'az', dashLimit: PAGE_SIZE };
  updateTopbar();
  render();
}

// ── Main render ──
const root = document.getElementById('root');

function render() {
  if (state.view === 'login')     renderLogin();
  else if (state.view === 'dashboard') renderDashboard();
  else if (state.view === 'editor')    renderEditor();
}

// ═══════════════════════════════════════
// VISTA: LOGIN
// ═══════════════════════════════════════
function renderLogin() {
  root.innerHTML = `
    <div class="wrap">
      <div class="header-card login-card">
        <div class="label">━━ ACCESO PROFESORES</div>
        <div style="display:flex;flex-direction:column;gap:16px;margin-top:24px">
          <div>
            <label class="field-label" for="login-pass">Contraseña</label>
            <input type="password" id="login-pass" class="pin-input" placeholder="••••••••" autocomplete="current-password" style="letter-spacing:4px;font-size:22px" />
            <p id="login-error" class="field-error" style="display:none"></p>
          </div>
          <button id="login-btn" class="btn-primary">INGRESAR</button>
        </div>
      </div>
    </div>`;

  const passEl = document.getElementById('login-pass');
  const btn    = document.getElementById('login-btn');
  const errEl  = document.getElementById('login-error');

  async function doLogin() {
    errEl.style.display = 'none';
    if (passEl.value !== APP_PASSWORD) {
      errEl.textContent = 'Contraseña incorrecta';
      errEl.style.display = 'block';
      passEl.value = '';
      passEl.focus();
      return;
    }
    state.authenticated = true;
    sessionStorage.setItem('coach', '1');
    root.innerHTML = `<div class="center"><div class="spin"></div></div>`;
    await loadMembers();
    navigate('dashboard');
  }

  btn.addEventListener('click', doLogin);
  passEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') doLogin(); });
}

// ═══════════════════════════════════════
// VISTA: DASHBOARD
// ═══════════════════════════════════════
async function loadMembers() {
  try {
    const res = await fetch(`${API_BASE}/members`, { headers: { 'X-Api-Key': API_KEY } });
    if (res.ok) state.members = await res.json();
  } catch { /* silent */ }
}

function formatUpdatedAt(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const days = Math.floor((Date.now() - d) / 86400000);
  if (days === 0) return 'Hoy';
  if (days === 1) return 'Ayer';
  if (days < 7)  return `Hace ${days} días`;
  if (days < 30) return `Hace ${Math.floor(days / 7)} sem.`;
  if (days < 365) return `Hace ${Math.floor(days / 30)} mes.`;
  return `Hace ${Math.floor(days / 365)} año${Math.floor(days / 365) > 1 ? 's' : ''}`;
}

function renderDashboard() {
  const total   = state.members.length;
  const withPlan    = state.members.filter(m => m.routinePlan).length;
  const withoutPlan = total - withPlan;

  const fAll  = state.dashFilter === 'all'     ? 'active'       : '';
  const fWith = state.dashFilter === 'with'    ? 'active-green' : '';
  const fWout = state.dashFilter === 'without' ? 'active-gray'  : '';
  const sortLabel = state.dashSort === 'az' ? 'A → Z' : 'Z → A';

  root.innerHTML = `
    <div class="wrap">
      <div class="label">━━ SOCIOS</div>

      <div class="stats-bar">
        <div class="stat-item">
          <span class="stat-num">${total}</span>
          <span class="stat-lbl">Total</span>
        </div>
        <div class="stat-item">
          <span class="stat-num green">${withPlan}</span>
          <span class="stat-lbl">Con rutina</span>
        </div>
        <div class="stat-item">
          <span class="stat-num muted">${withoutPlan}</span>
          <span class="stat-lbl">Sin rutina</span>
        </div>
      </div>

      <div class="search-wrap" style="margin-bottom:12px">
        <span class="search-icon">⌕</span>
        <input type="search" id="search-input" class="search-input" placeholder="Buscar por nombre..." />
      </div>

      <div class="filter-row">
        <button class="chip ${fAll}"  onclick="setDashFilter('all')">Todos</button>
        <button class="chip ${fWith}" onclick="setDashFilter('with')">Con rutina</button>
        <button class="chip ${fWout}" onclick="setDashFilter('without')">Sin rutina</button>
        <button class="sort-btn" onclick="toggleDashSort()">${sortLabel}</button>
      </div>

      <div id="member-list"></div>
    </div>`;

  const searchEl = document.getElementById('search-input');
  searchEl.addEventListener('input', () => { state.dashLimit = PAGE_SIZE; renderMemberList(searchEl.value); });
  renderMemberList('');
}

function setDashFilter(f) {
  state.dashFilter = f;
  state.dashLimit  = PAGE_SIZE;
  const q = document.getElementById('search-input')?.value || '';
  renderDashboard();
  const s = document.getElementById('search-input');
  if (s) { s.value = q; renderMemberList(q); }
}

function toggleDashSort() {
  state.dashSort  = state.dashSort === 'az' ? 'za' : 'az';
  state.dashLimit = PAGE_SIZE;
  const q = document.getElementById('search-input')?.value || '';
  renderDashboard();
  const s = document.getElementById('search-input');
  if (s) { s.value = q; renderMemberList(q); }
}

function showMore() {
  state.dashLimit += PAGE_SIZE;
  const q = document.getElementById('search-input')?.value || '';
  renderMemberList(q);
}

function renderMemberList(query) {
  const listEl = document.getElementById('member-list');
  if (!listEl) return;

  if (!state.members.length) {
    listEl.innerHTML = `<div class="no-results">Sin socios registrados</div>`;
    return;
  }

  const q = query.toLowerCase().trim();

  let filtered = state.members
    .map((m, originalIdx) => ({ m, originalIdx }))
    .filter(({ m }) => !q || `${m.firstName} ${m.lastName}`.toLowerCase().includes(q))
    .filter(({ m }) => {
      if (state.dashFilter === 'with')    return !!m.routinePlan;
      if (state.dashFilter === 'without') return !m.routinePlan;
      return true;
    });

  // Sort
  filtered.sort((a, b) => {
    const na = `${a.m.lastName} ${a.m.firstName}`.toLowerCase();
    const nb = `${b.m.lastName} ${b.m.firstName}`.toLowerCase();
    return state.dashSort === 'az' ? na.localeCompare(nb, 'es') : nb.localeCompare(na, 'es');
  });

  _filteredMembers = filtered;

  if (!filtered.length) {
    const msg = q ? `Sin resultados para "${esc(q)}"` : 'Sin socios en este filtro';
    listEl.innerHTML = `<div class="no-results">${msg}</div>`;
    return;
  }

  const total     = state.members.length;
  const visible   = filtered.slice(0, state.dashLimit);
  const remaining = filtered.length - visible.length;

  const countLabel = filtered.length < total
    ? `${filtered.length} de ${total} socios`
    : `${total} socio${total !== 1 ? 's' : ''}`;

  const rowsHtml = visible.map(({ m }, fi) => {
    const hasPlan   = !!m.routinePlan;
    const updatedAt = formatUpdatedAt(m.routinePlan?.updatedAt);
    return `
      <div class="member-row" onclick="openMember(${fi})">
        <div class="routine-dot ${hasPlan ? 'has-plan' : 'no-plan'}"></div>
        <div class="member-name">${esc(m.firstName)} ${esc(m.lastName)}</div>
        <div class="member-meta">
          <span class="routine-badge ${hasPlan ? 'ok' : ''}">${hasPlan ? 'Con rutina' : 'Sin rutina'}</span>
          ${updatedAt ? `<span class="member-updated">${esc(updatedAt)}</span>` : ''}
        </div>
        <span style="color:#8a93a6;font-size:18px;margin-left:4px">›</span>
      </div>`;
  }).join('');

  const loadMoreHtml = remaining > 0
    ? `<button class="load-more-btn" onclick="showMore()">
         + Ver ${Math.min(PAGE_SIZE, remaining)} más
         <span>${remaining} socio${remaining !== 1 ? 's' : ''} restante${remaining !== 1 ? 's' : ''}</span>
       </button>`
    : '';

  listEl.innerHTML = `<div class="results-info">${countLabel}</div>${rowsHtml}${loadMoreHtml}`;
}

function openMember(fi) {
  const entry = _filteredMembers[fi];
  if (!entry) return;
  const member = entry.m;

  state.editingMember   = member;
  state.currentShareToken = member.routinePlan?.shareToken || null;
  state.currentData       = null;

  if (state.currentShareToken) {
    loadAndOpenEditor(state.currentShareToken);
  } else {
    state.currentData = newPlanTemplate();
    navigate('editor');
  }
}

async function loadAndOpenEditor(shareToken) {
  root.innerHTML = `<div class="center"><div class="spin"></div></div>`;
  try {
    const res = await fetch(`${API_BASE}/routines/${encodeURIComponent(shareToken)}`, {
      headers: { 'X-Api-Key': API_KEY },
    });
    if (!res.ok) { navigate('dashboard'); return; }
    const payload = await res.json();
    state.currentData = payload.data;
    navigate('editor');
  } catch { navigate('dashboard'); }
}

// ═══════════════════════════════════════
// VISTA: EDITOR
// ═══════════════════════════════════════
function renderEditor() {
  const member = state.editingMember;
  const data   = state.currentData;

  root.innerHTML = `
    <div class="wrap">
      <div class="header-card">
        <div class="member-label">Rutina de <strong>${esc(member ? `${member.firstName} ${member.lastName}` : '')}</strong></div>
        <input type="text" class="text-input-big" id="plan-name" placeholder="NOMBRE DEL PLAN" value="${esc(data.name || '')}" />
        <input type="text" class="text-input-sub" id="plan-subtitle" placeholder="Descripción..." value="${esc(data.subtitle || '')}" />
      </div>

      <div id="blocks-container">
        ${(data.blocks || []).map((b, bi) => renderBlockHtml(b, bi)).join('')}
      </div>

      <button class="add-btn" id="add-block-btn" style="margin-bottom:60px">+ AGREGAR BLOQUE</button>
    </div>`;

  bindEditorEvents();
}

function renderBlockHtml(b, bi) {
  const exs = b.exercises || [];
  return `
    <div class="block-card">
      <div class="block-card-head">
        <div class="block-num">${bi + 1}</div>
        <input type="text" class="block-name-input" data-bi="${bi}" placeholder="Nombre del bloque" value="${esc(b.name || '')}" />
        <div class="block-series-wrap">
          <input type="number" class="block-series-input" data-bi="${bi}" min="0" value="${b.series || 3}" />
          <span>series def.</span>
        </div>
        <button class="btn-icon" data-action="del-block" data-bi="${bi}" title="Eliminar bloque">✕</button>
      </div>
      <div>
        ${exs.map((ex, ei) => renderExerciseHtml(ex, bi, ei, exs.length)).join('')}
      </div>
      <button class="add-btn" data-action="add-ex" data-bi="${bi}" style="margin-top:8px">+ AGREGAR EJERCICIO</button>
    </div>`;
}

function renderExerciseHtml(ex, bi, ei, totalEx) {
  const progs = ex.progressions || [];
  return `
    <div class="ex-card-editor">
      <div class="ex-top">
        <span class="ex-num-label">${String(ei + 1).padStart(2, '0')}</span>
        <input type="text" class="ex-name-input" data-bi="${bi}" data-ei="${ei}" placeholder="Nombre del ejercicio" value="${esc(ex.name || '')}" />
        <button class="btn-icon" data-action="move-up" data-bi="${bi}" data-ei="${ei}" title="Subir" ${ei === 0 ? 'disabled' : ''}>↑</button>
        <button class="btn-icon" data-action="move-down" data-bi="${bi}" data-ei="${ei}" title="Bajar" ${ei === totalEx - 1 ? 'disabled' : ''}>↓</button>
        <button class="btn-icon" data-action="del-ex" data-bi="${bi}" data-ei="${ei}" title="Eliminar ejercicio">✕</button>
      </div>
      <input type="text" class="notes-input" data-bi="${bi}" data-ei="${ei}" placeholder="Notas del ejercicio..." value="${esc(ex.notes || '')}" />
      <div class="progressions">
        ${progs.map((p, pi) => renderProgressionHtml(p, bi, ei, pi)).join('')}
        <button class="add-week-btn" data-action="add-week" data-bi="${bi}" data-ei="${ei}">+ Sem</button>
      </div>
    </div>`;
}

function renderProgressionHtml(p, bi, ei, pi) {
  const kg  = p.kg == null ? '' : String(p.kg);
  const rep = p.reps == null ? '' : String(p.reps);
  const ser = (!p.series || p.series === 0) ? '' : String(p.series);
  return `
    <div class="week">
      <div class="week-label">Sem ${p.week}</div>
      <div class="week-vals">
        <input type="text" class="reps-input" data-bi="${bi}" data-ei="${ei}" data-pi="${pi}" value="${esc(rep)}" placeholder="-" />
        <span class="week-x">×</span>
        <div class="weight-input" data-bi="${bi}" data-ei="${ei}" data-pi="${pi}">
          <button type="button" class="w-btn w-plus">+</button>
          <input type="number" step="2.5" min="0" inputmode="decimal" class="w-val" value="${esc(kg)}" placeholder="-" />
          <button type="button" class="w-btn w-minus">−</button>
        </div>
      </div>
      <div class="series-row">
        <span>series</span>
        <input type="number" min="0" inputmode="numeric" class="series-input" data-bi="${bi}" data-ei="${ei}" data-pi="${pi}" value="${esc(ser)}" placeholder="-" />
      </div>
      <button class="prog-del-btn" data-action="del-week" data-bi="${bi}" data-ei="${ei}" data-pi="${pi}" title="Eliminar semana">✕</button>
    </div>`;
}

function bindEditorEvents() {
  const STEP = 2.5;

  // Plan name / subtitle
  document.getElementById('plan-name').addEventListener('change', (e) => {
    state.currentData.name = e.target.value;
    triggerSave();
  });
  document.getElementById('plan-subtitle').addEventListener('change', (e) => {
    state.currentData.subtitle = e.target.value;
    triggerSave();
  });

  // Add block
  document.getElementById('add-block-btn').addEventListener('click', () => {
    const num = (state.currentData.blocks || []).length + 1;
    if (!state.currentData.blocks) state.currentData.blocks = [];
    state.currentData.blocks.push({ block_number: num, name: `Bloque ${num}`, series: 3, exercises: [] });
    triggerSave();
    renderEditor();
  });

  // Block name
  document.querySelectorAll('.block-name-input').forEach((el) => {
    el.addEventListener('change', () => {
      state.currentData.blocks[+el.dataset.bi].name = el.value;
      triggerSave();
    });
  });

  // Block series
  document.querySelectorAll('.block-series-input').forEach((el) => {
    el.addEventListener('change', () => {
      state.currentData.blocks[+el.dataset.bi].series = Math.max(0, parseInt(el.value) || 0);
      triggerSave();
    });
  });

  // Exercise name
  document.querySelectorAll('.ex-name-input').forEach((el) => {
    el.addEventListener('change', () => {
      state.currentData.blocks[+el.dataset.bi].exercises[+el.dataset.ei].name = el.value;
      triggerSave();
    });
  });

  // Notes
  document.querySelectorAll('.notes-input').forEach((el) => {
    el.addEventListener('change', () => {
      state.currentData.blocks[+el.dataset.bi].exercises[+el.dataset.ei].notes = el.value;
      triggerSave();
    });
  });

  // Reps
  document.querySelectorAll('.reps-input').forEach((el) => {
    el.addEventListener('change', () => {
      state.currentData.blocks[+el.dataset.bi].exercises[+el.dataset.ei].progressions[+el.dataset.pi].reps = el.value;
      triggerSave();
    });
  });

  // KG steppers
  document.querySelectorAll('.weight-input').forEach((wrap) => {
    const bi = +wrap.dataset.bi, ei = +wrap.dataset.ei, pi = +wrap.dataset.pi;
    const input = wrap.querySelector('.w-val');
    const commit = (raw) => {
      const n = Number(raw);
      const next = !isFinite(n) || n <= 0 ? '' : String(Math.round(n * 100) / 100);
      input.value = next;
      state.currentData.blocks[bi].exercises[ei].progressions[pi].kg = next || null;
      triggerSave();
    };
    wrap.querySelector('.w-plus').addEventListener('click', () => commit((Number(input.value) || 0) + STEP));
    wrap.querySelector('.w-minus').addEventListener('click', () => commit((Number(input.value) || 0) - STEP));
    input.addEventListener('change', () => commit(input.value));
  });

  // Series per progression
  document.querySelectorAll('.series-input').forEach((el) => {
    el.addEventListener('change', () => {
      const n = Math.max(0, parseInt(el.value) || 0);
      el.value = n === 0 ? '' : String(n);
      state.currentData.blocks[+el.dataset.bi].exercises[+el.dataset.ei].progressions[+el.dataset.pi].series = n;
      triggerSave();
    });
  });

  // Structural actions
  document.querySelectorAll('[data-action]').forEach((el) => {
    el.addEventListener('click', () => {
      const action = el.dataset.action;
      const bi = el.dataset.bi != null ? +el.dataset.bi : null;
      const ei = el.dataset.ei != null ? +el.dataset.ei : null;
      const pi = el.dataset.pi != null ? +el.dataset.pi : null;

      if (action === 'del-block') {
        if (!confirm('¿Eliminar este bloque? No se puede deshacer.')) return;
        state.currentData.blocks.splice(bi, 1);
        state.currentData.blocks.forEach((b, i) => { b.block_number = i + 1; });
        triggerSave();
        renderEditor();

      } else if (action === 'add-ex') {
        const exs = state.currentData.blocks[bi].exercises;
        const defaultSeries = state.currentData.blocks[bi].series || 3;
        const maxWeek = exs.length > 0
          ? Math.max(...exs.flatMap(e => e.progressions.map(p => p.week)), 1)
          : 1;
        const progs = Array.from({ length: maxWeek }, (_, i) => ({ week: i + 1, kg: null, reps: '', series: defaultSeries }));
        exs.push({ position: exs.length + 1, name: '', notes: '', progressions: progs });
        triggerSave();
        renderEditor();

      } else if (action === 'del-ex') {
        if (!confirm('¿Eliminar este ejercicio?')) return;
        state.currentData.blocks[bi].exercises.splice(ei, 1);
        state.currentData.blocks[bi].exercises.forEach((ex, i) => { ex.position = i + 1; });
        triggerSave();
        renderEditor();

      } else if (action === 'move-up' && ei > 0) {
        const exs = state.currentData.blocks[bi].exercises;
        [exs[ei - 1], exs[ei]] = [exs[ei], exs[ei - 1]];
        exs.forEach((ex, i) => { ex.position = i + 1; });
        triggerSave();
        renderEditor();

      } else if (action === 'move-down') {
        const exs = state.currentData.blocks[bi].exercises;
        if (ei < exs.length - 1) {
          [exs[ei], exs[ei + 1]] = [exs[ei + 1], exs[ei]];
          exs.forEach((ex, i) => { ex.position = i + 1; });
          triggerSave();
          renderEditor();
        }

      } else if (action === 'add-week') {
        const progs = state.currentData.blocks[bi].exercises[ei].progressions;
        const maxWeek = progs.reduce((m, p) => Math.max(m, p.week), 0);
        const defaultSeries = state.currentData.blocks[bi].series || 3;
        progs.push({ week: maxWeek + 1, kg: null, reps: '', series: defaultSeries });
        triggerSave();
        renderEditor();

      } else if (action === 'del-week') {
        state.currentData.blocks[bi].exercises[ei].progressions.splice(pi, 1);
        triggerSave();
        renderEditor();
      }
    });
  });
}

// ═══════════════════════════════════════
// BOOT
// ═══════════════════════════════════════
async function boot() {
  if (sessionStorage.getItem('coach') === '1') {
    state.authenticated = true;
    root.innerHTML = `<div class="center"><div class="spin"></div></div>`;
    updateTopbar();
    await loadMembers();
    navigate('dashboard');
    return;
  }
  navigate('login');
}

updateTopbar();
boot();
</script>
